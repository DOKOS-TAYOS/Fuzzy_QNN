experiment_name: debug_cpu
seed: 1234

dataset:
  name: iris
  test_size: 0.20
  val_size: 0.00
  scale: minmax
  feature_reduction: none
  d_in: 4

model:
  n_fuzzy_sets: 3
  n_rules: 4
  n_quantum_layers: 1

training:
  batch_size: 4
  epochs: 3
  learning_rate: 0.01
  weight_decay: 0.0
  lambda_sigma: 0.0
  early_stopping: false
  patience: 5
  min_delta: 0.00001
  deterministic: false

runtime:
  prefer_gpu: false
  require_gpu: false
  torch_device: cpu
  quantum_device: lightning.qubit
  diff_method: adjoint
  quantum_inputs_on_cpu: false

logging:
  show_progress: true
  plot_loss: true
  plot_accuracy: true
  save_history_csv: true
  save_history_json: true
  save_stdout_log: false

outputs:
  output_dir: runs
  save_best_model: true
  save_last_model: true
  save_rules: true
  save_fuzzy_parameters: true
